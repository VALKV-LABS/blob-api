services:
  # ── Postgres (integ only — unit tests run cargo test with no DB) ──────────────
  postgres-test:
    profiles: ["integ"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: storage_test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: storage_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_test"]
      interval: 3s
      timeout: 3s
      retries: 15

  # ── MinIO (integ only) ────────────────────────────────────────────────────────
  minio-test:
    profiles: ["integ"]
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    environment:
      MINIO_ROOT_USER: testkey
      MINIO_ROOT_PASSWORD: testsecret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Blob API under test ───────────────────────────────────────────────────────
  blob-api-test:
    profiles: ["integ"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://storage_test:test@postgres-test:5432/storage_test
      PGRST_JWT_SECRET: test-jwt-secret-32bytes-padded-ok
      ANON_KEY: ""
      SERVICE_KEY: ""
      GLOBAL_S3_BUCKET: test-bucket
      GLOBAL_S3_ENDPOINT: http://minio-test:9000
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testkey
      AWS_SECRET_ACCESS_KEY: testsecret
      TENANT_ID: test-tenant
      PORT: "5000"
      RUST_LOG: "valkv_blob=debug"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5000/storage/v1/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 15
    depends_on:
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy

  # ── Integration test runner ───────────────────────────────────────────────────
  blob-integ-tests:
    profiles: ["integ"]
    image: node:20-alpine
    working_dir: /integ
    volumes:
      - ./test:/integ
    command: node blob-integ.js
    environment:
      STORAGE_URL: http://blob-api-test:5000
      JWT_SECRET: test-jwt-secret-32bytes-padded-ok
    depends_on:
      blob-api-test:
        condition: service_healthy

  # ── Unit tests (cargo test — no external services needed) ─────────────────────
  blob-unit-tests:
    profiles: ["unit"]
    image: rust:1.92-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - cargo_registry:/usr/local/cargo/registry
    command: sh -c "apt-get update -qq && apt-get install -y -qq libssl-dev pkg-config 2>/dev/null && cargo test"
    environment:
      RUST_BACKTRACE: "1"
      CARGO_TERM_COLOR: always

volumes:
  cargo_registry:
